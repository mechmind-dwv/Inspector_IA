[tool.black]
line-length = 100
target-version = ["py310", "py311", "py312"]
extend-exclude = '''
(
    docs/archive/
  | examples/legacy/
)
'''

[tool.isort]
profile = "black"
line_length = 100
known_first_party = ["src", "synthetic_fraud_ecosystem", "graph_algorithms", "services"]
skip = ["docs/archive", "examples/legacy", ".venv"]

[tool.ruff]
line-length = 100
target-version = "py310"
extend-exclude = ["docs/archive", "examples/legacy"]

[tool.ruff.lint]
select = ["E", "W", "F", "I"]
ignore = []

[tool.ruff.lint.per-file-ignores]
"docs/archive/**" = ["E501"]
"examples/legacy/**" = ["E501"]

[tool.pytest.ini_options]
minversion = "8.0"
addopts = "-q"
testpaths = ["tests"]
